name: Java CI Pipeline

on:
  push:
    branches: [main, dev]   # Run on push to main or dev
  pull_request:
    branches: [main, dev]   # Run on PRs targeting main or dev

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Java (adjust version if needed)
      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'  # OpenJDK
          java-version: '17'

      # Step 3: Cache Maven dependencies (if using Maven)
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # Step 4: Install dependencies and build the project
      - name: Build with Maven
        run: mvn clean install -DskipTests=false

      # Step 5: Run TestNG tests
      - name: Run TestNG Tests
        run: mvn test

      # Optional: Upload test results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: target/surefire-reports/
