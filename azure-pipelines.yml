name: Java CI - PACCY AGENT Run

trigger:
  branches:
    include:
      - main

pool:
  name: 'Default'
  demands:
    - agent.name -equals PACCY AGENT

steps:
  - checkout: self

  - task: Maven@4
    displayName: 'Build & Run Tests'
    inputs:
      mavenPomFile: 'project2/pom.xml'
      # -Dtest=Sorting targets your test; -DfailIfNoTests=false prevents crash if no others exist
      goals: 'clean verify -Dtest=Sorting -DfailIfNoTests=false'
      publishJUnitResults: true
      testResultsFiles: 'project2\target\surefire-reports\TEST-*.xml'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.22' # Maps to your Java 22
      mavenAuthenticateFeed: false

  - task: PublishBuildArtifacts@1
    displayName: 'Upload Results'
    condition: always()
    inputs:
      PathtoPublish: 'project2\target\surefire-reports'
      ArtifactName: 'test-results'
      publishLocation: 'Container'