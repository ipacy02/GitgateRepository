name: Java CI Pipeline

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self

  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '17'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'

  - task: Maven@4
    displayName: 'Build & Run Tests'
    inputs:
      mavenPomFile: 'project2/pom.xml'
      # -DfailIfNoTests=false prevents the crash you just saw
      goals: 'clean verify -DfailIfNoTests=false' 
      publishJUnitResults: true
      # This looks for the results exactly where project2 creates them
      testResultsFiles: 'project2/target/surefire-reports/TEST-*.xml'

  - task: PublishBuildArtifacts@1
    displayName: 'Upload Test Results'
    condition: always()
    inputs:
      PathtoPublish: 'project2/target/surefire-reports'
      ArtifactName: 'test-results'
      publishLocation: 'Container'


