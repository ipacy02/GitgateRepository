name: Java CI Pipeline

trigger:
  branches:
    include:
      - main
      - dev
      - ft/*

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self

  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '17'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'

  - task: Maven@4
    displayName: 'Build & Run Tests'
    inputs:
      mavenPomFile: 'pom.xml'
      # Added -Dtest=* to force Maven to look for all tests
      goals: 'clean verify -Dtest=*' 
      publishJUnitResults: true
      testResultsFiles: '**/surefire-reports/TEST-*.xml'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.17'

  - task: PublishBuildArtifacts@1
    displayName: 'Upload Test Results'
    condition: always()
    inputs:
      # Changed to a wildcard search. If the folder exists ANYWHERE, it will find it.
      PathtoPublish: '$(Build.SourcesDirectory)'
      # We target only the surefire-reports files inside that directory
      ArtifactName: 'test-reports-bundle'
      publishLocation: 'Container'


