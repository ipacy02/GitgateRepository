name: Java CI Pipeline

trigger:
  branches:
    include:
      - main
      - dev
      - ft/*

pool:
  vmImage: 'ubuntu-latest' # Using Ubuntu for better speed and reliability

steps:
  - checkout: self

  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '17'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'

  - task: Maven@4
    displayName: 'Build & Run Tests'
    inputs:
      mavenPomFile: 'pom.xml'
      # 'verify' runs the tests; if this fails, the folder below won't exist!
      goals: 'clean verify' 
      publishJUnitResults: true
      testResultsFiles: '**/surefire-reports/TEST-*.xml'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.17'
      mavenAuthenticateFeed: false

  - task: PublishBuildArtifacts@1
    displayName: 'Upload Test Results'
    # 'always()' ensures we try to upload results even if a test fails
    condition: always() 
    inputs:
      # Use $(System.DefaultWorkingDirectory) for a clean Linux path
      PathtoPublish: '$(System.DefaultWorkingDirectory)/target/surefire-reports'
      ArtifactName: 'test-results'
      publishLocation: 'Container'


