name: Java CI Pipeline - PACCY AGENT

trigger:
  branches:
    include:
      - main

pool:
  name: 'Default'
  demands:
    - agent.name -equals PACCY AGENT

steps:
  - checkout: self

  - task: Maven@4
    displayName: 'Build & Run Tests'
    inputs:
      mavenPomFile: 'project2/pom.xml'
      # -Dtest=Sorting targets your file; -DfailIfNoTests=false prevents empty-match crashes
      goals: 'clean verify -Dtest=Sorting -DfailIfNoTests=false'
      publishJUnitResults: true
      # Windows agents use backslashes for file paths
      testResultsFiles: 'project2\target\surefire-reports\TEST-*.xml'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.22'  # This correctly maps to your local Java 22
      mavenAuthenticateFeed: false

  - task: PublishBuildArtifacts@1
    displayName: 'Upload Test Results'
    condition: always()
    inputs:
      PathtoPublish: 'project2\target\surefire-reports'
      ArtifactName: 'test-results'
      publishLocation: 'Container'