name: Java CI Pipeline - Local Agent

trigger:
  branches:
    include:
      - main

pool:
  name: 'Default' # This directs the job to your local Windows agent

steps:
  - checkout: self

  # We removed the JavaToolInstaller because your agent uses the 
  # System Java (v22) that we verified in PowerShell.

  - task: Maven@4
    displayName: 'Build & Run Tests'
    inputs:
      mavenPomFile: 'project2/pom.xml'
      # -Dtest=Sorting forces it to run your specific class
      # -DfailIfNoTests=false prevents build failure if no other tests match
      goals: 'clean verify -Dtest=Sorting -DfailIfNoTests=false'
      publishJUnitResults: true
      # Using Windows-style backslashes for the results path
      testResultsFiles: 'project2\target\surefire-reports\TEST-*.xml'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.22' # Links to your local JDK 22
      mavenAuthenticateFeed: false

  - task: PublishBuildArtifacts@1
    displayName: 'Upload Test Results'
    condition: always()
    inputs:
      PathtoPublish: 'project2\target\surefire-reports'
      ArtifactName: 'test-results'
      publishLocation: 'Container'



