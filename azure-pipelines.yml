name: Java CI - PACCY AGENT Final

trigger:
  branches:
    include:
      - main

pool:
  name: 'Default'
  # No demands needed since PACCY AGENT is your only online agent

steps:
  - checkout: self

  - task: Maven@4
    displayName: 'Build & Run Tests'
    inputs:
      # This points to the correct pom file inside project2
      mavenPomFile: 'project2/pom.xml'
      # Updated -Dtest to match your file name 'SortingTest'
      goals: 'clean verify -Dtest=SortingTest -DfailIfNoTests=false'
      publishJUnitResults: true
      # Recursive search ensures we find the XML regardless of folder depth
      testResultsFiles: '**/target/surefire-reports/TEST-*.xml'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.22'
      mavenAuthenticateFeed: false

  - task: PublishBuildArtifacts@1
    displayName: 'Upload Results'
    condition: always()
    inputs:
      # This uploads everything in the target folder for debugging
      PathtoPublish: 'project2/target/surefire-reports'
      ArtifactName: 'test-results'
      publishLocation: 'Container'