name: Java CI - PACCY AGENT FIXED

trigger:
  branches:
    include:
      - main

pool:
  name: 'Default'

steps:
  - checkout: self

  - task: Maven@4
    displayName: 'Build & Run Tests'
    inputs:
      mavenPomFile: 'project2/pom.xml'
      # 1. Changed -Dtest to SortingTest (to match your filename)
      # 2. Added -DfailIfNoTests=false to prevent the build from crashing if it skips
      goals: 'clean test -Dtest=SortingTest -DfailIfNoTests=false'
      publishJUnitResults: true
      # 3. Use a universal wildcard to find the XML anywhere in the work folder
      testResultsFiles: '**/TEST-*.xml'
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.22'
      mavenAuthenticateFeed: false

  - task: PublishBuildArtifacts@1
    displayName: 'Upload Debug Artifacts'
    condition: always()
    inputs:
      # This will upload the entire project2 folder if the tests fail
      # so we can see exactly what files were created on your computer.
      PathtoPublish: 'project2'
      ArtifactName: 'full-project-debug'
      publishLocation: 'Container'