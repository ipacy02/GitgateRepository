name: Java CI - PACCY AGENT SUCCESS

trigger:
  branches:
    include:
      - main

pool:
  name: 'Default' # Targets your local Windows agent

steps:
  - checkout: self

  - task: Maven@4
    displayName: 'Maven Test Execution'
    inputs:
      # Points to the pom.xml inside your project2 folder
      mavenPomFile: 'project2/pom.xml'
      
      # 'clean test' ensures a fresh build and runs your TestNG tests
      goals: 'clean test' 
      
      publishJUnitResults: true
      
      # The double asterisk (**/) tells the agent to look inside project2/target
      # even if the folder structure is deep on Windows.
      testResultsFiles: '**/surefire-reports/TEST-*.xml'
      
      javaHomeOption: 'JDKVersion'
      jdkVersionOption: '1.22' # Maps to your local Java 22
      mavenAuthenticateFeed: false

  - task: PublishBuildArtifacts@1
    displayName: 'Upload Raw Test Logs'
    condition: always()
    inputs:
      # If the 'Tests' tab is empty, we can download this to see the errors
      PathtoPublish: 'project2/target/surefire-reports'
      ArtifactName: 'surefire-raw-logs'
      publishLocation: 'Container'